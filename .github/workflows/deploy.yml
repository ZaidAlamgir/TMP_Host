name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [new-article-post]

permissions:
  contents: read
  deployments: write

# the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Main Repo (TMP_Host)
        uses: actions/checkout@v4
        with:
          repository: zaidalamgir/TMP_Host
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ./main_site

      - name: 2. Create Staging Directories
        run: |
          mkdir -p ./main_site/src/content/news
          mkdir -p ./_article_repos
        
      # --- CHECKOUT STEPS ---
      - name: 3-28. Clone All Article Repositories in Parallel
        run: |
          mkdir -p ./_article_repos
          
          clone_repo() {
            local repo="TheMuslimPost/$1"
            local path="./_article_repos/$2"
            echo "Cloning $repo in parallel..."
            git clone --depth 1 "https://${{ secrets.GH_PAT_FOR_CHECKOUT }}@github.com/${repo}.git" "$path" > /dev/null 2>&1 &
          }

          clone_repo "tmp-articles-world-politics" "world-politics"
          clone_repo "tmp-articles-indian-politics" "indian-politics"
          clone_repo "tmp-articles-muslim-world" "muslim-world"
          clone_repo "tmp-articles-technology" "technology"
          clone_repo "tmp-articles-medical-science" "medical-science"
          clone_repo "tmp-articles-global-economy" "global-economy"
          clone_repo "tmp-articles-art-culture" "art-culture"
          clone_repo "tmp-articles-weather" "weather"
          clone_repo "tmp-articles-sports" "sports"
          clone_repo "tmp-articles-national-news" "national-news"
          clone_repo "tmp-articles-international-news" "international-news"
          clone_repo "tmp-user-archives" "user-archives"
          clone_repo "tmp-articles-history" "history"
          clone_repo "tmp-articles-indian-muslims" "indian-muslims"
          clone_repo "tmp-articles-middle-east" "middle-east"
          clone_repo "tmp-articles-climate" "climate"
          clone_repo "tmp-articles-defense" "defense"
          clone_repo "tmp-articles-south-asia" "south-asia"
          clone_repo "tmp-articles-africa" "africa"
          clone_repo "tmp-articles-europe" "europe"
          clone_repo "tmp-articles-central-asia" "central-asia"
          clone_repo "tmp-articles-crime-alert" "crime-alert"
          clone_repo "tmp-articles-south-east-asia" "south-east-asia"
          clone_repo "tmp-articles-east-asia" "east-asia"
          clone_repo "tmp-articles-north-america" "north-america"
          clone_repo "tmp-articles-south-america" "south-america"

          echo "Waiting for all concurrent clones to complete..."
          wait
          echo "Clones completed successfully!"

      # --- CONSOLIDATION ---
      - name: 29. Consolidate All Posts
        run: |
          echo "--- Starting Consolidation ---"
          mkdir -p ./main_site/src/content/news

          # Function for standard repos (using 'posts' folder)
          copy_posts() {
            src="./_article_repos/$1/posts"
            if [ -d "$src" ]; then
              echo "Processing $1..."
              cp -r "$src"/. ./main_site/src/content/news/
            else
              echo "Skipping $1 (No posts folder found)"
            fi
          }

          copy_posts "world-politics"
          copy_posts "indian-politics"
          copy_posts "muslim-world"
          copy_posts "technology"
          copy_posts "medical-science"
          copy_posts "global-economy"
          copy_posts "art-culture"
          copy_posts "weather"
          copy_posts "sports"
          copy_posts "national-news"
          copy_posts "international-news"
          copy_posts "history"
          copy_posts "indian-muslims"
          copy_posts "middle-east"
          copy_posts "climate"
          copy_posts "defense"
          copy_posts "south-asia"
          copy_posts "africa"
          copy_posts "europe"
          copy_posts "central-asia"
          copy_posts "crime-alert"
          copy_posts "south-east-asia"
          copy_posts "east-asia"
          copy_posts "north-america"
          copy_posts "south-america"
          
          # --- SPECIAL COPY FOR USER ARCHIVES ---
          # (This repo uses '_posts' instead of 'posts')
          if [ -d "./_article_repos/user-archives/_posts" ]; then
             echo "Processing user-archives..."
             cp -r "./_article_repos/user-archives/_posts/." ./main_site/src/content/news/
          else
             echo "Skipping user-archives (No _posts folder found yet)"
          fi
          
          echo "--- Verification: Files in src/content/news ---"
          ls -R ./main_site/src/content/news
      
      - name: 29b. Cache Node Modules and Astro Cache
        uses: actions/cache@v4
        with:
          path: |
            ./main_site/node_modules
            ./main_site/.astro
          key: ${{ runner.os }}-astro-node-cache-${{ hashFiles('./main_site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-node-cache-

      - name: 30. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./main_site/package-lock.json
          
      - name: 31. Build with Astro
        run: |
          npm install --prefer-offline --no-audit --no-fund
          npm run build
        working-directory: ./main_site 

      # --- ASSET LINKS FIX ---
      - name: 31b. Setup AssetLinks Rewrite for Cloudflare
        run: |
          echo "Setting up AssetLinks Rewrite..."
          mkdir -p dist/.well-known
          cp public/.well-known/assetlinks.json dist/.well-known/assetlinks.json || true
          cp public/.well-known/assetlinks.json dist/assetlinks.json || true
          echo "/.well-known/assetlinks.json /assetlinks.json 200" >> dist/_redirects
          echo "AssetLinks rewrite setup complete."
        working-directory: ./main_site
        
      - name: 32. Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: astro-site
          path: ./main_site/dist
          retention-days: 1

  # --- SEPARATE DEPLOY JOB ---
  deploy:
    runs-on: ubuntu-latest
    needs: build 
    permissions:
      contents: read
      deployments: write
    steps:
      # 1. NEW: Download Source Code (Crucial for 'functions' folder)
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2. Download the Built Site (Contains your .well-known/assetlinks.json)
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-site
          # This downloads the site to a folder named '_site' in the current directory
          path: ./_site
          
      - name: Remove wrangler.toml to avoid configuration conflict
        run: rm -f wrangler.toml
          
      # 3. Deploy
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }} 
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} 
          # Wrangler will automatically find the 'functions' folder in the root
          # and deploy it alongside the './_site' static assets
          command: pages deploy ./_site --project-name=tmp-host