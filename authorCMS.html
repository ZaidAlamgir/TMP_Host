<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author CMS - TMP News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
        
        /* Glass Panel & General UI */
        .glass-panel { background: white; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        /* --- DYNAMIC BLOCK STYLES --- */
        .dynamic-content-block {
            border: 1px solid #e2e8f0; border-radius: 0.75rem; 
            padding: 3.5rem 1.25rem 1.5rem 1.25rem; margin-top: 1.5rem; background-color: #ffffff; position: relative; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: all 0.2s ease;
        }
        .dynamic-content-block:hover { border-color: #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        /* Drag Handle */
        .drag-handle { position: absolute; top: 0; left: 0; width: 100%; height: 2.5rem; display: flex; 
            align-items: center; justify-content: center;
            cursor: grab; color: #94a3b8; 
            background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;
            border-radius: 0.75rem 0.75rem 0 0; z-index: 10;
        }
        .drag-handle:hover { background-color: #f1f5f9; color: #64748b; cursor: grabbing; }

        /* Delete Button */
        .remove-block-btn { 
            position: absolute; top: 1.25rem; transform: translateY(-50%); right: 0.75rem; 
            width: 1.75rem; height: 1.75rem; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            padding: 0; margin: 0; line-height: 1; color: #ef4444; cursor: pointer; transition: all 0.2s; z-index: 20; 
        }
        .remove-block-btn:hover { background-color: #fee2e2; }
        .sortable-ghost { opacity: 0.4; background: #f8fafc; border: 2px dashed #cbd5e1; }

        /* --- RICH TEXT EDITOR STYLES --- */
        .rich-editor-wrapper {
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            background: #fff;
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s;
            margin-bottom: 0.5rem;
        }
        .rich-editor-wrapper:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .rich-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .rich-content-area {
            min-height: 80px;
            padding: 0.75rem;
            outline: none;
            line-height: 1.6;
            color: #334155;
            overflow-y: auto;
        }
        /* Specific heights for specific fields */
        .rich-content-area.headline-editor { min-height: 60px; font-size: 1.25rem; font-weight: 700; line-height: 1.3; }
        .rich-content-area.subheadline-editor { min-height: 50px; font-size: 1rem; color: #475569; }
        .rich-content-area.caption-editor { min-height: 40px; font-size: 0.875rem; }
        
        .rich-content-area:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
            display: block;
        }

        /* Chips */
        .tag-suggestions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
        .tag-chip, .category-chip, .country-chip {
            font-size: 0.75rem; font-weight: 600; padding: 0.35rem 0.85rem;
            border-radius: 9999px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
        }
        .tag-chip { background-color: #f1f5f9; color: #475569; }
        .tag-chip:hover { background-color: #e2e8f0; transform: translateY(-1px); }
        
        .country-chip { background-color: #ecfdf5; color: #047857; border-color: #6ee7b7; }
        .country-chip:hover { background-color: #d1fae5; transform: translateY(-1px); }
        .country-list-scroll { max-height: 220px; overflow-y: auto; padding: 4px; border: 1px solid #f1f5f9; background: #f8fafc; border-radius: 0.5rem; }

        /* Inputs */
        textarea, input, select { transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
        textarea:focus, input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        /* Modals */
        .link-modal-overlay, .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.4); z-index: 1000; backdrop-filter: blur(2px);
            display: flex; justify-content: center; align-items: flex-start; padding-top: 15vh;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .link-modal-overlay.visible, .modal-overlay.visible { opacity: 1; pointer-events: all; }
        .link-modal-content, .modal-content {
            background-color: white; padding: 2rem; border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%; max-width: 500px;
            transform: scale(0.95); transition: transform 0.2s ease;
        }
        .link-modal-overlay.visible .link-modal-content, .modal-overlay.visible .modal-content { transform: scale(1); }
        .link-modal-input {
            width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;
            font-size: 1rem; margin-bottom: 1.5rem;
        }
        .link-modal-buttons { display: flex; justify-content: flex-end; gap: 0.75rem; }
        .link-modal-btn { padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.2s;}
        .link-modal-btn:hover { opacity: 0.9; }
        .link-modal-btn.primary { background-color: #4f46e5; color: white; }
        .link-modal-btn.secondary { background-color: #f3f4f6; color: #374151; }

        /* --- TOOLBAR BUTTON STYLES --- */
        .tool-btn { 
            padding: 5px 8px; border-radius: 4px; border: 1px solid transparent; 
            cursor: pointer; color: #475569; font-size: 0.8rem; background: white; border-color: #cbd5e1;
            display: flex; align-items: center; gap: 4px;
        }
        .tool-btn:hover:not(:disabled) { background: #e2e8f0; color: #1e293b; }
        .color-picker-wrapper { position: relative; display: flex; align-items: center; }
        input[type="color"] { width: 20px; height: 20px; padding: 0; border: none; background: none; cursor: pointer; }

        /* Auto-save Indicator */
        .save-indicator {
            position: fixed; bottom: 20px; right: 20px; background: #ffffff;
            padding: 8px 16px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0; font-size: 0.75rem; font-weight: 600;
            color: #64748b; opacity: 0; transition: opacity 0.3s; z-index: 100;
        }
        .save-indicator.visible { opacity: 1; }
    </style>
</head>
<body class="text-slate-800 min-h-screen">

    <div id="save-indicator" class="save-indicator"><i class="fas fa-check-circle text-emerald-500 mr-2"></i>Draft Saved Locally</div>

    <div id="app" class="w-full max-w-5xl mx-auto p-4 sm:p-6 md:p-8">

        <div id="login-view" class="glass-panel p-10 rounded-2xl max-w-md mx-auto mt-20 text-center">
             <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl text-indigo-600">
                <i class="fas fa-user-shield"></i>
             </div>
             <h1 class="text-3xl font-extrabold mb-3 text-slate-900">Author Login</h1>
             <p class="text-slate-500 mb-8 leading-relaxed">Secure access for TMP News Authors.<br>Enter your credentials to continue.</p>
             
             <div class="space-y-4 mb-6 text-left">
                 <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Username / Email</label>
                    <input type="text" id="auth-username" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="name@TMPpnews.com">
                 </div>
                 <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label>
                    <input type="password" id="auth-password" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
                 </div>
             </div>

             <button id="login-button" class="bg-indigo-600 text-white font-bold py-3.5 px-6 rounded-xl hover:bg-indigo-500 transition-all transform hover:scale-[1.02] flex items-center justify-center w-full shadow-lg">
                 <span id="login-btn-text">Sign In</span>
                 <i id="login-spinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
             </button>
             <p id="login-error" class="text-red-500 text-sm mt-4 hidden"></p>
        </div>

        <div id="editor-view" class="hidden glass-panel p-6 sm:p-10 rounded-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-100 pb-6">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Article</h1>
                    <p class="text-sm text-slate-500 mt-1">Logged in as: <span id="display-username" class="font-semibold text-indigo-600">...</span></p>
                </div>
                <button id="logout-button" class="mt-4 md:mt-0 text-sm text-slate-400 hover:text-red-500 font-medium transition-colors flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Headline</label>
                    <div id="article-headline-container"></div> 
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Subheadline</label>
                    <div id="article-subheadline-container"></div> 
                </div>
            </div>

             <hr class="my-8 border-slate-100">

             <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                 <div>
                    <label for="article-main-image-url" class="block text-sm font-medium text-slate-700 mb-1">Main Image URL (Media URL)</label>
                    <div class="relative">
                        <i class="fas fa-image absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" id="article-main-image-url" class="w-full p-2.5 pl-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="https://media.tmpnews.com/images/...">
                    </div>
                 </div>
                 <div>
                    <label for="article-author" class="block text-sm font-medium text-slate-700 mb-1">Author Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" id="article-author" class="w-full p-2.5 pl-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" readonly>
                    </div>
                 </div>
             </div>
             
             <div class="mb-8">
                <label class="block text-sm font-medium text-slate-700 mb-1">Image Description</label>
                <div id="article-main-image-desc-container"></div>
             </div>

             <hr class="my-8 border-slate-100">

             <div class="mb-4">
                <label class="block text-sm font-bold text-slate-800 mb-2">Article Body</label>
                <div id="article-p1-container"></div>
             </div>

             <div id="dynamic-content-blocks"></div>

             <div class="my-8 p-6 bg-slate-50 rounded-xl border border-dashed border-slate-300 flex flex-col sm:flex-row items-center justify-center gap-4">
                 <select id="block-type-select" class="p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-white shadow-sm min-w-[200px]">
                    <option value="paragraph">Paragraph</option>
                    <option value="headline-h2">Headline (H2)</option>
                    <option value="headline-h3">Headline (H3)</option>
                    <option value="image">Image Block</option>
                    <option value="quote">Quote</option>
                    <option value="twitter">Twitter Embed</option>
                    <option value="youtube">YouTube Embed</option>
                 </select>
                 <button id="add-block-button" class="bg-slate-800 text-white font-semibold py-2.5 px-6 rounded-lg hover:bg-slate-700 transition-colors shadow-sm flex items-center">
                     <i class="fas fa-plus mr-2"></i> Add Block
                 </button>
             </div>

             <hr class="my-8 border-slate-100">

             <div class="mb-6">
                <label for="article-tags" class="block text-sm font-medium text-slate-700 mb-1">Tags</label>
                <input type="text" id="article-tags" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g., politics, world (comma-separated)">
                <div id="tag-suggestions-container" class="tag-suggestions">
                    <div class="tag-chip" data-tag="Breaking">Breaking</div>
                    <div class="tag-chip" data-tag="World">World</div>
                    <div class="tag-chip" data-tag="Politics">Politics</div>
                    <div class="tag-chip" data-tag="Tech">Tech</div>
                </div>
             </div>

             <div class="mb-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-2 gap-2">
                    <p class="text-xs font-bold text-emerald-600 uppercase tracking-wider">OIC Member Countries</p>
                    <div class="relative w-full sm:w-1/2">
                        <i class="fas fa-search absolute left-3 top-2.5 text-emerald-400 text-xs"></i>
                        <input type="text" id="country-search-input" class="w-full pl-8 p-2 text-xs border border-emerald-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Search country to add...">
                    </div>
                </div>
                <div id="country-suggestions-container" class="tag-suggestions country-list-scroll"></div>
             </div>

             <button id="publish-button" class="bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl hover:bg-indigo-500 transition-all shadow-lg hover:shadow-indigo-500/30 w-full flex items-center justify-center text-lg">
                 <span id="publish-text">Publish to User Posts</span>
                 <span id="publish-spinner" class="hidden">
                     <i class="fas fa-spinner fa-spin mr-2"></i> Publishing...
                 </span>
             </button>
             <p id="status-message" class="text-center mt-4 text-sm font-medium"></p>
        </div>
    </div>

    <div id="link-modal" class="link-modal-overlay">
        <div class="link-modal-content">
             <h3 class="text-xl font-bold mb-4 text-slate-800">Add Link</h3>
             <input type="text" id="link-url-input" class="link-modal-input" placeholder="https://example.com">
             <div class="link-modal-buttons">
                 <button id="cancel-link-btn" class="link-modal-btn secondary">Cancel</button>
                 <button id="add-link-btn" class="link-modal-btn primary">Add Link</button>
             </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WORKER_CONFIG = {
            url: 'https://auth.786313.xyz' 
        };

        // Static Lists
        const oicCountriesList = [
            "Afghanistan", "Albania", "Algeria", "Azerbaijan", "Bahrain", "Bangladesh", "Benin", 
            "Brunei", "Burkina Faso", "Cameroon", "Chad", "Comoros", "Côte d'Ivoire", "Djibouti", 
            "Egypt", "Gabon", "Gambia", "Guinea", "Guinea-Bissau", "Guyana", "Indonesia", "Iran", 
            "Iraq", "Jordan", "Kazakhstan", "Kuwait", "Kyrgyzstan", "Lebanon", "Libya", "Malaysia", 
            "Maldives", "Mali", "Mauritania", "Morocco", "Mozambique", "Niger", "Nigeria", "Oman", 
            "Pakistan", "Palestine", "Qatar", "Saudi Arabia", "Senegal", "Sierra Leone", "Somalia", 
            "Sudan", "Suriname", "Syria", "Tajikistan", "Togo", "Tunisia", "Turkey", "Turkmenistan", 
            "Uganda", "United Arab Emirates", "Uzbekistan", "Yemen", "Kosovo"
        ];
        
        // DOM Elements
        const loginView = document.getElementById('login-view'), editorView = document.getElementById('editor-view');
        const loginButton = document.getElementById('login-button'), logoutButton = document.getElementById('logout-button');
        const authUsername = document.getElementById('auth-username'), authPassword = document.getElementById('auth-password');
        const loginError = document.getElementById('login-error'), loginSpinner = document.getElementById('login-spinner');
        const loginBtnText = document.getElementById('login-btn-text');

        const addBlockButton = document.getElementById('add-block-button'), blockTypeSelect = document.getElementById('block-type-select');
        const dynamicBlocksContainer = document.getElementById('dynamic-content-blocks');
        const publishButton = document.getElementById('publish-button'), statusMessage = document.getElementById('status-message');
        
        const linkModal = document.getElementById('link-modal'), linkUrlInput = document.getElementById('link-url-input');
        const addLinkBtn = document.getElementById('add-link-btn'), cancelLinkBtn = document.getElementById('cancel-link-btn');
        
        const tagsInput = document.getElementById('article-tags');
        const countryContainer = document.getElementById('country-suggestions-container');
        const countrySearchInput = document.getElementById('country-search-input');
        const saveIndicator = document.getElementById('save-indicator');

        // Global State
        let sessionData = null; // Stores token, user_id, author_name
        let activeContentEditable = null;
        let saveTimeout = null;

        // ==========================================
        // HELPER FUNCTIONS
        // ==========================================
        
        // Rich Text Formatting
        window.formatText = function(cmd, value = null) {
            document.execCommand(cmd, false, value);
            triggerSave();
            if (activeContentEditable) activeContentEditable.focus();
        };

        function renderRichEditor(id, placeholder, value, customClass = '') {
            return `
            <div class="rich-editor-wrapper">
                <div class="rich-toolbar">
                    <button class="tool-btn" onmousedown="event.preventDefault(); formatText('bold')" title="Bold"><i class="fas fa-bold"></i></button>
                    <button class="tool-btn" onmousedown="event.preventDefault(); formatText('italic')" title="Italic"><i class="fas fa-italic"></i></button>
                    <button class="tool-btn" onmousedown="event.preventDefault(); showLinkModal()" title="Link"><i class="fas fa-link"></i></button>
                    <div class="color-picker-wrapper tool-btn" title="Text Color">
                        <i class="fas fa-palette mr-1"></i>
                        <input type="color" onchange="formatText('foreColor', this.value)">
                    </div>
                </div>
                <div id="${id}" class="rich-content-area ${customClass}" contenteditable="true" data-placeholder="${placeholder}">${value || ''}</div>
            </div>`;
        }

        function initStaticEditors() {
            document.getElementById('article-headline-container').innerHTML = renderRichEditor('article-headline', 'Main Headline', '', 'headline-editor');
            document.getElementById('article-subheadline-container').innerHTML = renderRichEditor('article-subheadline', 'Subheadline', '', 'subheadline-editor');
            document.getElementById('article-main-image-desc-container').innerHTML = renderRichEditor('article-main-image-desc', 'Image Description', '', 'caption-editor');
            document.getElementById('article-p1-container').innerHTML = renderRichEditor('article-p1', 'Start writing your article...', '');
        }

        // Tag Handling
        function renderCountries(filterText = '') {
            countryContainer.innerHTML = ''; 
            const filtered = oicCountriesList.filter(country => 
                country.toLowerCase().includes(filterText.toLowerCase())
            );
            filtered.forEach(country => {
                const chip = document.createElement('div');
                chip.className = 'country-chip'; 
                chip.textContent = country;
                chip.onclick = () => addTag(country);
                countryContainer.appendChild(chip);
            });
        }

        function addTag(tag) {
            const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
            if (!currentTags.includes(tag)) {
                tagsInput.value = tagsInput.value ? `${tagsInput.value}, ${tag}` : tag;
                triggerSave();
            }
        }

        // ==========================================
        // AUTHENTICATION LOGIC
        // ==========================================
        async function handleLogin() {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();

            if(!username || !password) {
                loginError.textContent = "Please enter username and password";
                loginError.classList.remove('hidden');
                return;
            }

            loginBtnText.classList.add('hidden');
            loginSpinner.classList.remove('hidden');
            loginError.classList.add('hidden');

            try {
                const response = await fetch(`${WORKER_CONFIG.url}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if(!response.ok) throw new Error(data.error || 'Login failed');

                // Success
                sessionData = {
                    token: data.token,
                    user_id: data.user_id,
                    username: data.username
                };
                
                // Persist session
                localStorage.setItem('tmp_cms_session', JSON.stringify(sessionData));
                
                initEditor();
                
            } catch (err) {
                loginError.textContent = err.message;
                loginError.classList.remove('hidden');
            } finally {
                loginBtnText.classList.remove('hidden');
                loginSpinner.classList.add('hidden');
            }
        }

        function initEditor() {
            loginView.classList.add('hidden');
            editorView.classList.remove('hidden');
            
            document.getElementById('display-username').textContent = sessionData.username;
            document.getElementById('article-author').value = sessionData.username; // Default author name

            initStaticEditors();
            restoreDraft();
        }

        function handleLogout() {
            localStorage.removeItem('tmp_cms_session');
            sessionData = null;
            editorView.classList.add('hidden');
            loginView.classList.remove('hidden');
            authPassword.value = '';
        }

        // Check for existing session
        window.onload = () => {
            renderCountries();
            const savedSession = localStorage.getItem('tmp_cms_session');
            if(savedSession) {
                sessionData = JSON.parse(savedSession);
                initEditor();
            }
            
            // Drag and Drop
            Sortable.create(dynamicBlocksContainer, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function() { triggerSave(); }
            });
        };

        loginButton.addEventListener('click', handleLogin);
        logoutButton.addEventListener('click', handleLogout);

        // ==========================================
        // BLOCK MANAGEMENT & PUBLISH
        // ==========================================
        function createBlockHTML(blockType, blockId, data = {}) {
            let html = `
                <div class="drag-handle"><i class="fas fa-grip-vertical"></i></div>
                <button onclick="document.getElementById('${blockId}').remove(); triggerSave();" class="remove-block-btn"><i class="fas fa-times"></i></button>
            `;
            
            switch (blockType) {
                case 'paragraph': 
                    html += renderRichEditor(`${blockId}-editor`, 'Paragraph...', data.value || ''); break;
                case 'headline-h2': 
                    html += `<h3 class="text-xs font-bold text-slate-400 mb-2">H2 Headline</h3>` + renderRichEditor(`${blockId}-editor`, 'Heading...', data.value || '', 'headline-editor'); break;
                case 'headline-h3': 
                    html += `<h3 class="text-xs font-bold text-slate-400 mb-2">H3 Headline</h3>` + renderRichEditor(`${blockId}-editor`, 'Heading...', data.value || '', 'headline-editor'); break;
                case 'image':
                    html += `<div class="mb-4"><label class="text-xs text-slate-500">Image URL</label><input type="text" class="dynamic-image-url w-full p-2 border rounded" value="${data.url||''}"></div>` +
                            `<label class="text-xs text-slate-500">Caption</label>` + renderRichEditor(`${blockId}-desc`, 'Caption...', data.desc || '', 'caption-editor'); break;
                case 'quote':
                    html += `<h3 class="text-xs font-bold text-slate-400 mb-2">Blockquote</h3>` + renderRichEditor(`${blockId}-quote`, 'Quote...', data.value || ''); break;
                default: // Embeds
                     html += `<div class="mb-4"><label class="text-xs text-slate-500">${blockType} URL</label><input type="text" class="dynamic-social-url w-full p-2 border rounded" value="${data.url||''}"></div>`;
            }
            return html;
        }

        function addBlock(type, id = null, data = {}) {
            const blockId = id || `block-${Date.now()}`;
            const div = document.createElement('div');
            div.className = 'dynamic-content-block';
            div.id = blockId;
            div.dataset.blockType = type;
            div.innerHTML = createBlockHTML(type, blockId, data);
            dynamicBlocksContainer.appendChild(div);
        }

        addBlockButton.addEventListener('click', () => {
            addBlock(blockTypeSelect.value);
            triggerSave();
        });

        // --- PUBLISH TO SUPABASE VIA WORKER ---
        publishButton.addEventListener('click', async () => {
            if(!sessionData) return;

            const headline = document.getElementById('article-headline').innerHTML;
            const p1 = document.getElementById('article-p1').innerHTML;
            
            if(!headline || !p1) {
                statusMessage.textContent = "Headline and Body are required.";
                statusMessage.style.color = "red";
                return;
            }

            document.getElementById('publish-text').classList.add('hidden');
            document.getElementById('publish-spinner').classList.remove('hidden');
            publishButton.disabled = true;

            // COMBINE CONTENT
            // We combine P1 + all dynamic blocks into one HTML string for the 'content' column
            let fullContent = `<div class="article-body"><div class="paragraph">${p1}</div>`;
            
            document.querySelectorAll('.dynamic-content-block').forEach(block => {
                const type = block.dataset.blockType;
                if(type === 'paragraph') {
                    fullContent += `<div class="paragraph">${block.querySelector('.rich-content-area').innerHTML}</div>`;
                } else if(type.startsWith('headline')) {
                    const level = type === 'headline-h2' ? 'h2' : 'h3';
                    fullContent += `<${level}>${block.querySelector('.rich-content-area').innerHTML}</${level}>`;
                } else if(type === 'image') {
                    const url = block.querySelector('.dynamic-image-url').value;
                    const desc = block.querySelector('.rich-content-area').innerHTML;
                    if(url) fullContent += `<figure><img src="${url}" alt="Article Image"><figcaption>${desc}</figcaption></figure>`;
                } else if(type === 'quote') {
                    fullContent += `<blockquote>${block.querySelector('.rich-content-area').innerHTML}</blockquote>`;
                } else {
                    const url = block.querySelector('.dynamic-social-url').value;
                    if(url) fullContent += `<div class="embed-link"><a href="${url}">External Content (${type})</a></div>`;
                }
            });
            fullContent += `</div>`;

            // Prepare Payload
            const payload = {
                user_id: sessionData.user_id,
                headline: headline, // HTML string
                subheadline: document.getElementById('article-subheadline').innerHTML,
                content: fullContent,
                tags: tagsInput.value.split(',').map(t=>t.trim()).filter(t=>t),
                media_url: document.getElementById('article-main-image-url').value,
                image_description: document.getElementById('article-main-image-desc').innerHTML,
                author_name: document.getElementById('article-author').value,
                // Optional
                link: null, 
                web_link: null
            };

            try {
                const res = await fetch(`${WORKER_CONFIG.url}/publish`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionData.token}`
                    },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();

                if(!res.ok) throw new Error(result.error || 'Publishing failed');

                statusMessage.textContent = "Article Published Successfully!";
                statusMessage.style.color = "green";
                localStorage.removeItem('tmp_cms_draft'); // Clear draft
                
                // Optional: Reset form
                setTimeout(() => window.location.reload(), 2000);

            } catch (err) {
                statusMessage.textContent = `Error: ${err.message}`;
                statusMessage.style.color = "red";
            } finally {
                document.getElementById('publish-text').classList.remove('hidden');
                document.getElementById('publish-spinner').classList.add('hidden');
                publishButton.disabled = false;
            }
        });

        // --- DRAFT SAVING ---
        function triggerSave() {
            saveIndicator.classList.remove('visible');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveDraft, 1000);
        }
        function saveDraft() {
            // Simple draft logic
            const draft = {
                headline: document.getElementById('article-headline').innerHTML,
                subheadline: document.getElementById('article-subheadline').innerHTML,
                p1: document.getElementById('article-p1').innerHTML,
                tags: tagsInput.value,
                blocks: [] // (Logic to save block state similar to previous CMS)
            };
            localStorage.setItem('tmp_cms_draft', JSON.stringify(draft));
            saveIndicator.classList.add('visible');
        }
        function restoreDraft() {
            const saved = localStorage.getItem('tmp_cms_draft');
            if(saved) {
                const draft = JSON.parse(saved);
                if(draft.headline) document.getElementById('article-headline').innerHTML = draft.headline;
                if(draft.subheadline) document.getElementById('article-subheadline').innerHTML = draft.subheadline;
                if(draft.p1) document.getElementById('article-p1').innerHTML = draft.p1;
                if(draft.tags) tagsInput.value = draft.tags;
            }
        }
        
        // Listeners for draft
        document.getElementById('editor-view').addEventListener('input', triggerSave);
        countrySearchInput.addEventListener('input', (e) => renderCountries(e.target.value));
        document.getElementById('tag-suggestions-container').addEventListener('click', (e) => {
            if(e.target.classList.contains('tag-chip')) addTag(e.target.dataset.tag);
        });

        // Modals
        function showLinkModal(url='') { linkUrlInput.value = url; linkModal.classList.add('visible'); linkUrlInput.focus(); }
        addLinkBtn.onclick = () => {
            if(activeContentEditable) {
                activeContentEditable.focus();
                document.execCommand('createLink', false, linkUrlInput.value);
            }
            linkModal.classList.remove('visible');
        };
        cancelLinkBtn.onclick = () => linkModal.classList.remove('visible');
        document.addEventListener('focusin', (e) => { if(e.target.isContentEditable) activeContentEditable = e.target; });

    </script>
</body>
</html>
